<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
  </head>
  <body>

    <div id="loading-screen">
      <p class="loading-text">Cargando :3 ...</p>
    </div>

    <div class="controls-hint">WASD / ↑↓←→ para moverse</div>

    <div class="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">▲</button>
      <div class="dpad-row">
        <button class="dpad-btn dpad-left" data-dir="left">◀</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn dpad-right" data-dir="right">▶</button>
      </div>
      <button class="dpad-btn dpad-down" data-dir="down">▼</button>
    </div>

    <div id="experience">
        <canvas id="experience-canvas">

        </canvas>
    </div>
    
    <div class="modal hidden">
      <div class="modal-header">
        <h1 class="modal-title">Project 1</h1>
        <button class="exit-button">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-project-description"></div>
        <div class="modal-technologies"></div>
      </div>
      <div class="modal-footer">
        <a class="modal-project-visit-button">Ver Proyecto →</a>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.149.0/examples/jsm/"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
